name: Build and Push Docker Image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Push to Aliyun
        run: |
          docker tag ghcr.io/mr-pick/obfuscapk:latest registry.cn-hangzhou.aliyuncs.com/pick/obfuscapk:latest
          docker push registry.cn-hangzhou.aliyuncs.com/pick/obfuscapk:latest
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: src
          push: true
          tags: ghcr.io/mr-pick/obfuscapk:latest
